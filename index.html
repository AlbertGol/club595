<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLUB 595 | Bio-Page</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- ШАПКА -->
            <header class="profile-header">
                <div class="avatar-circle">595</div>
                <h1>CLUB 5/95</h1>
                <p class="tagline">Innovative Massage & Tech Studio</p>
                <div class="social-row">
                    <a href="#">Instagram</a> • <a href="#">WhatsApp</a>
                </div>
            </header>

            <!-- УСЛУГИ -->
            <section class="section">
                <h2 class="section-title">Our Services</h2>
                <div id="services-list">
                    <!-- Сюда подгрузятся услуги из базы -->
                </div>
            </section>

            <!-- ПОРТФОЛИО -->
            <section class="section">
                <h2 class="section-title">Portfolio</h2>
                <div class="portfolio-grid" id="portfolio-list">
                    <div class="port-item"></div><div class="port-item"></div>
                    <div class="port-item"></div><div class="port-item"></div>
                </div>
            </section>

            <!-- ОТЗЫВЫ -->
            <section class="section">
                <h2 class="section-title">Reviews</h2>
                <div id="reviews-list">
                    <div class="review-card">⭐⭐⭐⭐⭐ "The best massage ever!"</div>
                </div>
            </section>

            <button class="btn-admin" onclick="window.location.href='#admin'">Staff Entrance</button>
        </div>
    </div>

    <!-- Модальное окно записи -->
    <div id="booking-modal" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <div id="modal-content"></div>
            <button class="btn-close" onclick="closeBooking()">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="admin.js"></script>
</body>
</html>
